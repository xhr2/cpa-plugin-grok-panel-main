name: Build and Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: "1.24.x"

jobs:
  build:
    name: Build linux/amd64
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      asset: ${{ steps.meta.outputs.asset }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc zip

      - name: Test
        run: go test ./...

      - name: Resolve version
        id: meta
        run: |
          set -euo pipefail
          VERSION=$(grep -E 'pluginVersion\s+=' main.go | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ -z "${VERSION}" ]]; then
            echo "pluginVersion not found in main.go" >&2
            exit 1
          fi
          TAG="v${VERSION}"
          ASSET="grok-panel_${VERSION}_linux_amd64.zip"
          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "asset=${ASSET}"
          } >> "$GITHUB_OUTPUT"
          echo "version=${VERSION} tag=${TAG} asset=${ASSET}"

      - name: Build plugin library
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -buildmode=c-shared -trimpath -ldflags="-s -w" -o dist/grok-panel.so .
          rm -f dist/*.h
          test -f dist/grok-panel.so
          ls -lah dist/

      - name: Package zip
        run: |
          set -euo pipefail
          cd dist
          zip -9 "${{ steps.meta.outputs.asset }}" grok-panel.so
          ls -lah
          test -f "${{ steps.meta.outputs.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-amd64
          path: dist/${{ steps.meta.outputs.asset }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-linux-amd64
          path: out

      - name: Prepare checksums
        run: |
          set -euo pipefail
          cd out
          ls -lah
          sha256sum grok-panel_*.zip | tee checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          files: |
            out/grok-panel_*.zip
            out/checksums.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
